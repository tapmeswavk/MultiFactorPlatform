syntax = "proto3";

package LQTP;

message FactorRequest {
  string formula    = 1;
  int32  begin_date = 2; // YYYYMMDD
  int32  end_date   = 3; // YYYYMMDD
  int32  warmup     = 4;
  string filter     = 5;
  int32  interval_minutes = 6; // 0 means daily; >0 computes minute factors every N minutes
  int32  interval_seconds = 7; // 0 means disabled; >0 computes intraday factors every N seconds
  string definition_id = 8; // Registered factor UUID; formula is ignored when provided
}

message FactorValue {
  string symbol = 1;
  double value  = 2;
}

message FactorDailyResponse {
  int32                trade_date = 1; // YYYYMMDD
  repeated FactorValue values     = 2;
  string               error      = 3;
  int32                quote_time = 4; // HHMM for minute factors; HHMMSS for second factors; 0 for daily factors
}

message FactorDailyValues {
  int32                trade_date = 1; // YYYYMMDD
  repeated FactorValue values     = 2;
  int32                quote_time = 3; // HHMM for minute factors; HHMMSS for second factors; 0 for daily factors
}

enum IntradayAnalysisPriceSource {
  INTRADAY_ANALYSIS_PRICE_SOURCE_UNSPECIFIED = 0;
  INTRADAY_ANALYSIS_PRICE_SOURCE_SNAPSHOT = 1;
  INTRADAY_ANALYSIS_PRICE_SOURCE_TRANSACTION = 2;
}

message FactorAnalysisRequest {
  int32                       begin_date   = 1; // YYYYMMDD
  int32                       end_date     = 2; // YYYYMMDD
  repeated FactorDailyValues  daily_values = 3;
  IntradayAnalysisPriceSource intraday_price_source = 4;
}

message FactorGroupPnl {
  int32 group = 1;
  repeated double pnl = 2;
}

message FactorAnalysis {
  double mean_ic = 1;
  double std_ic = 2;
  double icir = 3;
  double ic_positive_ratio = 4;
  repeated double group_mean_returns = 5;
  double long_short_return = 6;
  double long_short_sharpe = 7;
  double coverage = 8;
  repeated double daily_ic = 9;
  repeated int32  trade_dates = 10;
  repeated double daily_ls_returns = 11;
  repeated FactorGroupPnl group_pnls = 12;
  repeated int32  quote_times = 13;
  repeated int64  sample_counts = 14;
  repeated double coverages = 15;
}

message FactorAnalysisResponse {
  FactorAnalysis analysis = 1;
  string         error    = 2;
}

enum FactorValueReturnMode {
  FACTOR_VALUE_RETURN_MODE_NONE = 0;
  FACTOR_VALUE_RETURN_MODE_SAMPLE = 1;
  FACTOR_VALUE_RETURN_MODE_ALL = 2;
}

message RunFactorRequest {
  string formula    = 1;
  int32  begin_date = 2; // YYYYMMDD
  int32  end_date   = 3; // YYYYMMDD
  int32  warmup     = 4;
  string filter     = 5;
  int32  interval_minutes = 6; // 0 means daily; >0 computes minute factors every N minutes
  int32  interval_seconds = 7; // 0 means disabled; >0 computes intraday factors every N seconds
  bool   analyze = 8;
  FactorValueReturnMode value_return_mode = 9;
  int32  value_limit = 10;
  IntradayAnalysisPriceSource intraday_price_source = 11;
  string factor_name = 12; // Optional display name persisted with analysis results
  string description = 13; // Optional analysis description persisted with results
  string definition_id = 14; // Registered factor UUID; formula is ignored when provided
  map<string, string> tags = 15; // Optional tags used when registering a new factor definition
}

message FactorPointStat {
  int32 trade_date = 1; // YYYYMMDD
  int32 quote_time = 2; // HHMM/HHMMSS; 0 for daily
  int64 value_count = 3;
  int64 valid_count = 4;
}

message RunFactorResponse {
  repeated FactorDailyValues values = 1;
  FactorAnalysis analysis = 2;
  string error = 3;
  int64 total_value_rows = 4;
  int32 total_time_points = 5;
  bool values_truncated = 6;
  repeated FactorPointStat point_stats = 7;
}

message BatchRunFactorItem {
  string formula = 1;
  string factor_name = 2;
  string description = 3;
  string definition_id = 4; // Registered factor UUID; formula is ignored when provided
  map<string, string> tags = 5;
}

message BatchRunFactorRequest {
  repeated BatchRunFactorItem factors = 1;
  int32 begin_date = 2; // YYYYMMDD
  int32 end_date = 3; // YYYYMMDD
  int32 warmup = 4;
  string filter = 5;
  bool analyze = 6;
  FactorValueReturnMode value_return_mode = 7;
  int32 value_limit = 8;
  int32 batch_size = 9; // request override; defaults to config Factor.BatchRunDefaultSize
}

message BatchRunFactorResult {
  int32 index = 1;
  string factor_name = 2;
  string definition_id = 3;
  RunFactorResponse response = 4;
}

message BatchRunFactorResponse {
  repeated BatchRunFactorResult results = 1;
  string error = 2;
}

message FactorAnalysisRun {
  string analysis_id = 1;
  string definition_id = 2;
  string factor_name = 3;
  int32 begin_date = 4;
  int32 end_date = 5;
  string formula = 6;
  string filter = 7;
  uint32 warmup = 8;
  int32 frequency = 9;
  uint32 interval_minutes = 10;
  uint32 interval_seconds = 11;
  int32 intraday_price_source = 12;
  int64 value_rows = 13;
  int32 time_points = 14;
  string description = 15;
  string created_at = 16;
  FactorAnalysis analysis = 17;
}

message ListFactorAnalysesRequest {
  int32 limit = 1;
}

message ListFactorAnalysesResponse {
  repeated FactorAnalysisRun analyses = 1;
}

message GetFactorAnalysisRequest {
  string analysis_id = 1;
}

message ListFactorRankingsRequest {
  int32 begin_date = 1; // YYYYMMDD
  int32 end_date = 2; // YYYYMMDD
  uint32 horizon_days = 3; // defaults to 1
  uint32 execution_lag_days = 4; // defaults to 1
  int32 frequency = 5; // 1=daily, 2=minute, 3=second; 0 defaults to daily
  int32 min_days = 6; // defaults to 20
  int32 limit = 7; // defaults to 50
}

message FactorRanking {
  int32 rank = 1;
  string definition_id = 2;
  string factor_name = 3;
  uint32 factor_version = 4;
  uint32 horizon_days = 5;
  uint32 execution_lag_days = 6;
  int32 frequency = 7;
  double rank_ic_mean = 8;
  double rank_ic_std = 9;
  double rank_ic_ir = 10;
  double rank_ic_positive_ratio = 11;
  double avg_coverage = 12;
  int32 days = 13;
  double score = 14;
}

message ListFactorRankingsResponse {
  repeated FactorRanking rankings = 1;
  string error = 2;
}

message ListFactorsRequest {}

message GetFactorRequest {
  string definition_id = 1;
}

message FactorDefinitionActionRequest {
  string definition_id = 1;
}

message DeleteFactorRequest {
  string definition_id = 1;
  bool delete_values = 2; // Also remove persisted values and analysis rows from ClickHouse.
}

message FactorDefinition {
  string definition_id = 1;
  string factor_name = 2;
  uint32 version = 3;
  string formula = 4;
  string filter = 5;
  uint32 warmup = 6;
  int32 frequency = 7;
  uint32 interval_minutes = 8;
  uint32 interval_seconds = 9;
  string status = 10;
  string description = 11;
  map<string, string> tags = 12;
}

message ListFactorsResponse {
  repeated FactorDefinition factors = 1;
}

message FactorDefinitionActionResponse {
  string definition_id = 1;
  string status = 2;
  string message = 3;
  FactorDefinition factor = 4;
}

message UpdatePublishedFactorsRequest {
  int32 trade_date = 1; // YYYYMMDD; daily data must already be available
  int32 max_frequency = 2; // 1=daily, 2=minute, 3=second; 0 defaults to daily
}

message FactorUpdateResult {
  string definition_id = 1;
  string factor_name = 2;
  int64 value_rows = 3;
  string error = 4;
}

message UpdatePublishedFactorsResponse {
  repeated FactorUpdateResult results = 1;
}

message UpdateFactorValuesRequest {
  string definition_id = 1; // Registered factor UUID
  int32 trade_date = 2; // YYYYMMDD; daily data must already be available
  bool overwrite = 3; // true deletes existing values for this factor/date before recomputing
}

message UpdatePublishedFactorDailyIcRequest {
  int32 completed_trade_date = 1; // YYYYMMDD; mature signal date is derived from the trading calendar
  int32 max_frequency = 2; // 1=daily, 2=minute, 3=second; 0 defaults to daily
  uint32 horizon_days = 3; // defaults to 1
  uint32 execution_lag_days = 4; // defaults to 1
  bool overwrite = 5; // true deletes existing IC rows for the same factor/date/window before inserting
}

message FactorDailyIcUpdateResult {
  string definition_id = 1;
  string factor_name = 2;
  int32 signal_date = 3;
  int32 completed_trade_date = 4;
  uint32 horizon_days = 5;
  uint32 execution_lag_days = 6;
  int64 rows = 7;
  string error = 8;
}

message UpdatePublishedFactorDailyIcResponse {
  repeated FactorDailyIcUpdateResult results = 1;
}

service FactorService {
  rpc AnalyzeFactor (FactorAnalysisRequest) returns (FactorAnalysisResponse);
  rpc RunFactor (RunFactorRequest) returns (RunFactorResponse);
  rpc BatchRunFactor (BatchRunFactorRequest) returns (BatchRunFactorResponse);
  rpc ListFactorAnalyses (ListFactorAnalysesRequest) returns (ListFactorAnalysesResponse);
  rpc GetFactorAnalysis (GetFactorAnalysisRequest) returns (FactorAnalysisRun);
  rpc ListFactorRankings (ListFactorRankingsRequest) returns (ListFactorRankingsResponse);
  rpc ListFactors (ListFactorsRequest) returns (ListFactorsResponse);
  rpc GetFactor (GetFactorRequest) returns (FactorDefinition);
  rpc PublishFactor (FactorDefinitionActionRequest) returns (FactorDefinitionActionResponse);
  rpc DeprecateFactor (FactorDefinitionActionRequest) returns (FactorDefinitionActionResponse);
  rpc DeleteFactor (DeleteFactorRequest) returns (FactorDefinitionActionResponse);
  rpc UpdatePublishedFactors (UpdatePublishedFactorsRequest) returns (UpdatePublishedFactorsResponse);
  rpc UpdateFactorValues (UpdateFactorValuesRequest) returns (FactorUpdateResult);
  rpc UpdatePublishedFactorDailyIc (UpdatePublishedFactorDailyIcRequest) returns (UpdatePublishedFactorDailyIcResponse);
  rpc ListFactorValues (ListFactorValuesRequest) returns (ListFactorValuesResponse);
  rpc ListFactorDailyIc (ListFactorDailyIcRequest) returns (ListFactorDailyIcResponse);
}

message ListFactorValuesRequest {
  string definition_id = 1;
  int32 begin_date = 2;
  int32 end_date = 3;
  int32 limit = 4;
}

message ListFactorValuesResponse {
  repeated FactorDailyResponse values = 1;
  int64 total_rows = 2;
  bool values_truncated = 3;
  string error = 4;
}

message ListFactorDailyIcRequest {
  string definition_id = 1;
  int32 begin_date = 2;
  int32 end_date = 3;
  uint32 horizon_days = 4;
  uint32 execution_lag_days = 5;
}

message DailyFactorIc {
  int32 trade_date = 1;
  double rank_ic = 2;
  int64 sample_count = 3;
  double coverage = 4;
  uint32 horizon_days = 5;
  uint32 execution_lag_days = 6;
}

message ListFactorDailyIcResponse {
  repeated DailyFactorIc daily_ic = 1;
  string error = 2;
}
